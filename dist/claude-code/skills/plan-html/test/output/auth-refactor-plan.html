<!-- plan-html | md-equivalent: ~40 lines | html: ~120 lines | ratio: 3.0x | justified: multi-phase roadmap with progress tracking + collapsible sections -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auth System Refactor — Implementation Plan</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--accent:#2563eb;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--accent:#3b82f6}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:860px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.progress-wrap{background:var(--border);border-radius:9999px;height:8px;width:100%;margin:1rem 0}
.progress-bar{height:8px;border-radius:9999px;background:var(--accent);transition:width .4s ease}
.progress-label{font-size:.8rem;opacity:.7;margin-bottom:.5rem}
details{border:1px solid var(--border);border-radius:.5rem;margin-bottom:.75rem;background:var(--card)}
summary{padding:.875rem 1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.75rem;list-style:none}
summary::-webkit-details-marker{display:none}
summary::before{content:"▶";font-size:.6rem;transition:transform .2s;opacity:.5}
details[open] summary::before{transform:rotate(90deg)}
.badge{font-size:.7rem;font-weight:700;padding:.2rem .5rem;border-radius:.25rem;text-transform:uppercase;letter-spacing:.03em}
.done{background:#d1fae5;color:#065f46}.progress{background:#fef3c7;color:#92400e}.pending{background:#f1f5f9;color:#475569}
@media(prefers-color-scheme:dark){.done{background:#064e3b;color:#6ee7b7}.progress{background:#78350f;color:#fcd34d}.pending{background:#1e293b;color:#94a3b8}}
.phase-body{padding:1rem;border-top:1px solid var(--border)}
ul{padding-left:1.25rem}li{margin:.25rem 0;font-size:.925rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Auth System Refactor</h1>
      <div class="meta">Implementation Plan · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="progress-label" id="progress-label">Loading…</div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div id="phases"><!-- populated from planData() --></div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{
  "title": "Auth System Refactor",
  "phases": [
    {
      "name": "Phase 1 — Supabase Auth Migration",
      "status": "done",
      "items": [
        {"text": "Replace NextAuth with @supabase/ssr", "done": true},
        {"text": "Migrate session handling to server components", "done": true},
        {"text": "Update middleware for cookie-based tokens", "done": true},
        {"text": "Remove JWT secret from .env", "done": true}
      ]
    },
    {
      "name": "Phase 2 — Row-Level Security Policies",
      "status": "progress",
      "items": [
        {"text": "Enable RLS on users and profiles tables", "done": true},
        {"text": "Write select policy: own rows only", "done": true},
        {"text": "Write insert/update policies", "done": false},
        {"text": "Test with service role vs anon key", "done": false}
      ]
    },
    {
      "name": "Phase 3 — OAuth Providers",
      "status": "pending",
      "items": [
        {"text": "Configure Google OAuth in Supabase dashboard", "done": false},
        {"text": "Add GitHub as secondary provider", "done": false},
        {"text": "Implement account-linking flow", "done": false},
        {"text": "Update redirect URLs for prod/staging", "done": false}
      ]
    },
    {
      "name": "Phase 4 — MFA & Audit Logging",
      "status": "pending",
      "items": [
        {"text": "Enable TOTP MFA in Supabase", "done": false},
        {"text": "Build MFA enrollment UI component", "done": false},
        {"text": "Wire auth.audit_log_entries to monitoring pipeline", "done": false},
        {"text": "Write E2E tests for login/logout/MFA flow", "done": false}
      ]
    }
  ]
}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Implementation Plan';
  
  const phasesDiv = document.getElementById('phases');
  if (phasesDiv) {
    let phasesHtml = '';
    (data.phases || []).forEach((phase, idx) => {
      const status = (phase.status || 'pending').toLowerCase();
      phasesHtml += `
        <details ${status === 'progress' || idx === 0 ? 'open' : ''}>
          <summary>
            <span class="badge ${status}">${status}</span>
            <span>${phase.name}</span>
          </summary>
          <div class="phase-body">
            <ul>
              ${(phase.items || []).map(item => `
                <li class="${item.done ? 'done' : ''}">${item.text}</li>
              `).join('')}
            </ul>
          </div>
        </details>
      `;
    });
    phasesDiv.innerHTML = phasesHtml;
  }
}

function afterRender(data) {
  const items = document.querySelectorAll('.phase-body li');
  const done = document.querySelectorAll('.phase-body li.done').length;
  const pct = items.length ? Math.round(done / items.length * 100) : 0;
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = pct + '%';
  const label = document.getElementById('progress-label');
  if (label) label.textContent = pct + '% complete (' + done + '/' + items.length + ' items)';
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Implementation Plan') + '\n\n';
  (data.phases || []).forEach(phase => {
    md += `## ${phase.name} [Status: ${(phase.status || 'pending').toUpperCase()}]\n`;
    (phase.items || []).forEach(item => {
      const check = item.done ? '[x]' : '[ ]';
      md += `- ${check} ${item.text}\n`;
    });
    md += '\n';
  });
  return md.trim();
}
</script>
</body>
</html>
