<!-- TEMPLATE: annotated-flowchart | slots: {{title}}, {{steps[]:{id,label,annotation,branch?:{label,target}}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--accent:#2563eb;--accent-muted:#dbeafe;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--accent:#3b82f6;--accent-muted:#1e3a8a}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:900px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.flow{display:flex;flex-direction:column;gap:0;align-items:flex-start;padding-left:2rem}
.flow-item{display:flex;flex-direction:column;align-items:flex-start;position:relative}
.flow-item+.flow-item::before{content:"";position:absolute;top:0;left:calc(2rem - 1px);width:2px;height:1.5rem;background:var(--border)}
.connector{width:2px;height:1.5rem;background:var(--border);margin-left:calc(2rem - 1px)}
.step-row{display:flex;align-items:center;gap:1rem;cursor:pointer}
.step-circle{width:2.5rem;height:2.5rem;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;flex-shrink:0;transition:all .2s}
.step-circle.active{border-color:var(--accent);background:var(--accent-muted);color:var(--accent)}
.step-label{font-weight:600;font-size:.95rem}
.branch-wrap{margin-left:calc(2rem + 1rem + 1.5rem);margin-top:.5rem;margin-bottom:.5rem;display:flex;gap:.75rem;align-items:center}
.branch-arrow{font-size:.8rem;opacity:.5}
.branch-chip{font-size:.75rem;font-weight:600;padding:.2rem .5rem;border-radius:.25rem;border:1px dashed var(--border);opacity:.7;cursor:pointer;transition:all .15s}
.branch-chip:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.annotation-box{margin-top:1rem;padding:1rem;border:1px solid var(--accent);border-radius:.5rem;background:var(--accent-muted);font-size:.9rem;min-height:60px;display:none}
.annotation-box.show{display:block}
.annotation-title{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;opacity:.6;margin-bottom:.4rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Annotated Flowchart · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="copyState()">Copy State</button>
      <button onclick="exportMd()">Export MD</button>
    </div>
  </header>
  <div class="flow" id="flow"><!-- agent populates steps --></div>
  <div class="annotation-box" id="annotation">
    <div class="annotation-title">Step Annotation</div>
    <div id="annotation-text">Click a step to see details.</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function copyState(){navigator.clipboard.writeText(document.getElementById('plan-data').textContent.trim()).then(()=>toast('State copied!'))}
function exportMd(){
  const steps=document.querySelectorAll('.step-row');
  let md='# '+document.querySelector('h1').textContent+'\n\n';
  steps.forEach((s,i)=>{md+=(i+1)+'. '+s.querySelector('.step-label').textContent.trim()+'\n';});
  navigator.clipboard.writeText(md.trim()).then(()=>toast('Markdown copied!'))
}
function selectStep(id,annotation){
  document.querySelectorAll('.step-circle').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('step-'+id);
  if(el)el.querySelector('.step-circle').classList.add('active');
  const box=document.getElementById('annotation');
  document.getElementById('annotation-text').textContent=annotation;
  box.classList.add('show');
}
</script>
</body>
</html>
