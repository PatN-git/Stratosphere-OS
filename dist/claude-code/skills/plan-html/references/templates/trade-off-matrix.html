<!-- TEMPLATE: trade-off-matrix | slots: {{title}}, {{options[]:{name,desc}}}, {{criteria[]:{name,desc}}}, {{ratings[option][criterion]:{score:1-5,note}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--s1:#d1fae5;--s1t:#065f46;--s2:#fef9c3;--s2t:#854d0e;--s3:#fee2e2;--s3t:#991b1b}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--s1:#064e3b;--s1t:#6ee7b7;--s2:#713f12;--s2t:#fde68a;--s3:#7f1d1d;--s3t:#fca5a5}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.table-wrap{overflow-x:auto;margin-top:.5rem}
table{width:100%;border-collapse:collapse;text-align:left}
th,td{padding:.75rem 1rem;border:1px solid var(--border);vertical-align:top}
thead th{background:var(--card);font-weight:700;font-size:.875rem;white-space:nowrap}
thead th:first-child{min-width:160px}
.option-header{font-weight:700;font-size:.9rem}
.option-sub{font-size:.8rem;opacity:.6;font-weight:400;margin-top:.2rem}
.cell-score{display:flex;flex-direction:column;gap:.35rem}
.dots{display:flex;gap:3px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.dot.filled{background:currentColor}
.score-5,.score-4{color:var(--s1t);background:var(--s1)}
.score-3{color:var(--s2t);background:var(--s2)}
.score-2,.score-1{color:var(--s3t);background:var(--s3)}
.score-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .4rem;border-radius:.25rem}
.note{font-size:.78rem;opacity:.75;margin-top:.2rem;line-height:1.3}
.winner{position:relative}
.winner::after{content:"★ Best";position:absolute;top:.4rem;right:.5rem;font-size:.65rem;font-weight:700;background:#2563eb;color:#fff;padding:.1rem .35rem;border-radius:.25rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Trade-off Matrix · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="copyState()">Copy State</button>
      <button onclick="exportMd()">Export MD</button>
    </div>
  </header>
  <div class="table-wrap">
    <table id="matrix"><!-- agent populates: thead with options, tbody with criteria rows --></table>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function copyState(){navigator.clipboard.writeText(document.getElementById('plan-data').textContent.trim()).then(()=>toast('State copied!'))}
function exportMd(){
  let md='# '+document.querySelector('h1').textContent+'\n\n';
  const rows=document.querySelectorAll('tbody tr');
  rows.forEach(row=>{
    const cells=row.querySelectorAll('td');
    md+='**'+cells[0].textContent.trim()+'**: ';
    for(let i=1;i<cells.length;i++){md+=cells[i].querySelector('.note')?.textContent.trim()||'—';if(i<cells.length-1)md+=' | ';}
    md+='\n';
  });
  navigator.clipboard.writeText(md.trim()).then(()=>toast('Markdown copied!'))
}
function renderDots(score){
  return Array.from({length:5},(_,i)=>`<span class="dot ${i<score?'filled':''}"></span>`).join('');
}
</script>
</body>
</html>
