<!-- TEMPLATE: decision-record | slots: {{title}}, {{id}}, {{status:"proposed"|"accepted"|"deprecated"|"superseded"}}, {{context}}, {{options[]:{name,pros[],cons[]}}}, {{decision}}, {{consequences[]}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--accent:#2563eb;--accent-muted:#dbeafe;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--accent:#3b82f6;--accent-muted:#1e3a8a}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.6}
.wrap{max-width:820px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.adr-meta{display:flex;align-items:center;gap:.75rem;margin-top:.35rem;flex-wrap:wrap}
.adr-id{font-size:.8rem;font-family:monospace;opacity:.5}
.status-chip{font-size:.75rem;font-weight:700;padding:.2rem .55rem;border-radius:.25rem;text-transform:uppercase}
.proposed{background:#dbeafe;color:#1d4ed8}.accepted{background:#dcfce7;color:#15803d}.deprecated{background:#f1f5f9;color:#64748b}.superseded{background:#fef3c7;color:#92400e}
@media(prefers-color-scheme:dark){.proposed{background:#1e3a8a;color:#93c5fd}.accepted{background:#14532d;color:#86efac}.deprecated{background:#1e293b;color:#94a3b8}.superseded{background:#713f12;color:#fde68a}}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.section{margin-bottom:1.75rem}
h2{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.5;margin-bottom:.75rem;padding-bottom:.35rem;border-bottom:1px solid var(--border)}
p{margin-bottom:.75rem;font-size:.95rem}
.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.option-card{border:1px solid var(--border);border-radius:.5rem;padding:1rem;background:var(--card)}
.option-card.chosen{border-color:var(--accent);background:var(--accent-muted)}
.option-name{font-weight:700;margin-bottom:.6rem;font-size:.95rem}
.pros-cons{display:flex;flex-direction:column;gap:.5rem}
.pro-label{font-size:.75rem;font-weight:700;color:#15803d;text-transform:uppercase;letter-spacing:.03em}
.con-label{font-size:.75rem;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.03em}
@media(prefers-color-scheme:dark){.pro-label{color:#4ade80}.con-label{color:#f87171}}
ul{padding-left:1.1rem;font-size:.875rem}li{margin:.2rem 0}
.decision-block{background:var(--accent-muted);border:1px solid var(--accent);border-radius:.5rem;padding:1rem;font-size:.95rem}
.consequence-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:.5rem}
.consequence-list li{padding:.6rem 1rem;border-radius:.375rem;border:1px solid var(--border);background:var(--card);font-size:.9rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="adr-meta">
        <!-- populated from planData() -->
      </div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="section">
    <h2>Context</h2>
    <div id="context"><!-- populated from planData() --></div>
  </div>
  <div class="section">
    <h2>Options Considered</h2>
    <div class="options-grid" id="options"><!-- populated from planData() --></div>
  </div>
  <div class="section">
    <h2>Decision</h2>
    <div class="decision-block" id="decision"><!-- populated from planData() --></div>
  </div>
  <div class="section">
    <h2>Consequences</h2>
    <ul class="consequence-list" id="consequences"><!-- populated from planData() --></ul>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Decision Record';
  
  const adrMeta = container.querySelector('.adr-meta');
  if (adrMeta) {
    adrMeta.innerHTML = `
      <span class="adr-id">${data.id || ''}</span>
      <span class="status-chip ${data.status || 'proposed'}">${data.status || 'proposed'}</span>
    `;
  }
  
  const contextDiv = document.getElementById('context');
  if (contextDiv) contextDiv.textContent = data.context || '';
  
  const optionsDiv = document.getElementById('options');
  if (optionsDiv) {
    let optionsHtml = '';
    (data.options || []).forEach(opt => {
      const isChosen = data.decision && data.decision.includes(opt.name);
      optionsHtml += `
        <div class="option-card ${isChosen ? 'chosen' : ''}">
          <div class="option-name">${opt.name}</div>
          <div class="pros-cons">
            ${opt.pros && opt.pros.length > 0 ? `
              <div class="pro-label">Pros</div>
              <ul>
                ${opt.pros.map(pro => `<li>${pro}</li>`).join('')}
              </ul>
            ` : ''}
            ${opt.cons && opt.cons.length > 0 ? `
              <div class="con-label">Cons</div>
              <ul>
                ${opt.cons.map(con => `<li>${con}</li>`).join('')}
              </ul>
            ` : ''}
          </div>
        </div>
      `;
    });
    optionsDiv.innerHTML = optionsHtml;
  }
  
  const decisionDiv = document.getElementById('decision');
  if (decisionDiv) decisionDiv.textContent = data.decision || '';
  
  const consequencesUl = document.getElementById('consequences');
  if (consequencesUl) {
    consequencesUl.innerHTML = (data.consequences || []).map(cons => `<li>${cons}</li>`).join('');
  }
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Decision Record') + '\n\n';
  if (data.id) md += `**ID:** ${data.id}\n`;
  if (data.status) md += `**Status:** ${data.status.toUpperCase()}\n`;
  md += '\n## Context\n' + (data.context || '') + '\n\n';
  md += '## Options Considered\n';
  (data.options || []).forEach(opt => {
    md += `### ${opt.name}\n`;
    if (opt.pros && opt.pros.length > 0) {
      md += `**Pros:**\n`;
      opt.pros.forEach(pro => md += `- ${pro}\n`);
    }
    if (opt.cons && opt.cons.length > 0) {
      md += `**Cons:**\n`;
      opt.cons.forEach(con => md += `- ${con}\n`);
    }
    md += '\n';
  });
  md += '## Decision\n' + (data.decision || '') + '\n\n';
  md += '## Consequences\n';
  (data.consequences || []).forEach(cons => {
    md += `- ${cons}\n`;
  });
  return md.trim();
}
</script>
</body>
</html>
