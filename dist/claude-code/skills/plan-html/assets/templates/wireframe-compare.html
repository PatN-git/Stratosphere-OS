<!-- TEMPLATE: wireframe-compare | slots: {{title}}, {{options[]:{name,desc,rationale,wireframe_regions[]:{name,desc}}}, {{lenses[]:{name,desc}}}, {{ratings[option][lens]:{score:1-5,note}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--s1:#d1fae5;--s1t:#065f46;--s2:#fef9c3;--s2t:#854d0e;--s3:#fee2e2;--s3t:#991b1b;--wireframe-bg:#f1f5f9;--wireframe-border:#cbd5e1}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--s1:#064e3b;--s1t:#6ee7b7;--s2:#713f12;--s2t:#fde68a;--s3:#7f1d1d;--s3t:#fca5a5;--wireframe-bg:#1e293b;--wireframe-border:#475569}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;margin-bottom:2rem}
.column{border:1px solid var(--border);border-radius:.5rem;background:var(--bg);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;position:relative}
.column-title{font-size:1.1rem;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.column-desc{font-size:.85rem;opacity:.7;line-height:1.4}
.wireframe-box{border:1px solid var(--wireframe-border);border-radius:.375rem;background:var(--wireframe-bg);padding:.75rem;display:flex;flex-direction:column;gap:.5rem;min-height:240px}
.wf-region{border:1px dashed var(--wireframe-border);background:var(--bg);padding:.4rem;font-size:.75rem;border-radius:.25rem;font-family:monospace;text-align:center;font-weight:bold}
.rationale-header{font-size:.85rem;font-weight:700;margin-top:.5rem}
.rationale-text{font-size:.8rem;opacity:.8;line-height:1.4}
.lens-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.25rem;margin-top:.5rem}
.lens-badge{font-size:.7rem;font-weight:700;padding:.2rem;border-radius:.25rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.lens-val-5,.lens-val-4{color:var(--s1t);background:var(--s1)}
.lens-val-3{color:var(--s2t);background:var(--s2)}
.lens-val-2,.lens-val-1{color:var(--s3t);background:var(--s3)}
.lens-label{font-size:.6rem;opacity:.7;text-transform:uppercase}
.lens-score{font-size:.85rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Wireframe Comparison & 5-Lens Evaluation · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="copyState()">Copy State</button>
      <button onclick="exportMd()">Export MD</button>
    </div>
  </header>
  <div class="grid" id="compare-grid">
    <!-- agent populates: columns representing 3 UI directions -->
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function copyState(){navigator.clipboard.writeText(document.getElementById('plan-data').textContent.trim()).then(()=>toast('State copied!'))}
function exportMd(){
  let md='# '+document.querySelector('h1').textContent+'\n\n';
  const columns=document.querySelectorAll('.column');
  columns.forEach(col=>{
    md+='## '+col.querySelector('.column-title').textContent.trim()+'\n';
    md+=col.querySelector('.column-desc').textContent.trim()+'\n\n';
    md+='### Rationale\n'+col.querySelector('.rationale-text').textContent.trim()+'\n\n';
    md+='### Wireframe Regions\n';
    col.querySelectorAll('.wf-region').forEach(reg=>{
      md+='- '+reg.textContent.trim()+'\n';
    });
    md+='\n';
  });
  navigator.clipboard.writeText(md.trim()).then(()=>toast('Markdown copied!'))
}
</script>
</body>
</html>
