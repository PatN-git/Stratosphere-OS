<!-- TEMPLATE: plan-document | slots: {{title}}, {{sections[]:{id,title,kind:"prose"|"steps"|"compare"|"callout"|"deepdive"|"diagram",...}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{
  --bg:#fff;
  --text:#171717;
  --border:#e5e5e5;
  --card:#f8fafc;
  --accent:#2563eb;
  --accent-muted:#dbeafe;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --shadow:0 1px 3px 0 rgba(0,0,0,0.1),0 1px 2px -1px rgba(0,0,0,0.1);
  --radius:0.5rem;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#090d16;
    --text:#f3f4f6;
    --border:#1f2937;
    --card:#111827;
    --accent:#3b82f6;
    --accent-muted:#1e3a8a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.6}
.wrap{max-width:1200px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}

.reading-progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent); width: 0%; z-index: 1001; transition: width 0.1s ease; }

.layout { display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; }
.sidebar { position: sticky; top: 2rem; height: calc(100vh - 4rem); overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
.search-box input {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border-radius: 0.375rem;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
}
.toc ul { list-style: none; padding: 0; }
.toc li { margin-bottom: 0.5rem; }
.toc-link { text-decoration: none; color: var(--text); opacity: 0.6; font-size: 0.875rem; transition: all 0.2s; display: block; padding: 0.25rem 0; }
.toc-link:hover { opacity: 1; padding-left: 4px; }
.toc-link.active { opacity: 1; color: var(--accent); font-weight: 600; border-left: 2px solid var(--accent); padding-left: 6px; }

.content { display: flex; flex-direction: column; gap: 2.5rem; }
.spy-section { scroll-margin-top: 2rem; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; background: var(--bg); box-shadow: var(--shadow); }
.spy-section h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

/* Kind spec styles */
.prose-block { font-size: 0.95rem; opacity: 0.9; }
.prose-block p { margin-bottom: 1rem; }
.prose-block p:last-child { margin-bottom: 0; }

.steps-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
.step-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--card); }
.step-item.done { opacity: 0.7; }
.step-check { font-weight: bold; color: var(--accent); font-size: 1.1rem; line-height: 1; }
.step-text { font-size: 0.9rem; }

.compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.compare-card { border: 1px solid var(--border); border-radius: 0.375rem; padding: 1rem; background: var(--card); }
.compare-title { font-weight: 700; margin-bottom: 0.5rem; font-size: 0.95rem; }
.compare-desc { font-size: 0.85rem; opacity: 0.8; }

.callout-box { border-left: 4px solid var(--accent); padding: 1rem; background: var(--card); border-radius: 0 0.375rem 0.375rem 0; }
.callout-box.warn { border-left-color: #f59e0b; }
.callout-box.error { border-left-color: #ef4444; }
.callout-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.25rem; }
.callout-body { font-size: 0.875rem; opacity: 0.85; }

details.deepdive-box { border: 1px solid var(--border); border-radius: 0.375rem; background: var(--card); }
details.deepdive-box summary { padding: 0.75rem 1rem; font-weight: 600; cursor: pointer; user-select: none; }
details.deepdive-box .deepdive-body { padding: 1rem; border-top: 1px solid var(--border); font-size: 0.9rem; }

.diagram-container { display: flex; justify-content: center; padding: 1rem; background: var(--card); border-radius: 0.375rem; border: 1px solid var(--border); }
.svg-diagram { max-width: 100%; height: auto; }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: .6rem 1.25rem; border-radius: .375rem; transform: translateY(150%); transition: transform .3s cubic-bezier(.16,1,.3,1); z-index: 1000; font-size: .875rem }
.toast.show { transform: translateY(0) }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
}
</style>
</head>
<body>
<div id="reading-progress" class="reading-progress"></div>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Plan Document · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  
  <div class="layout">
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Filter sections..." oninput="filterContent(this.value)">
      </div>
      <nav class="toc" aria-label="Table of Contents">
        <ul id="toc-list"><!-- populated from planData() --></ul>
      </nav>
    </aside>
    <main id="content" class="content">
      <!-- populated from planData() -->
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function esc(s){return(s===null||s===undefined)?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function filterContent(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.spy-section').forEach(sec => {
    const text = sec.textContent.toLowerCase();
    const match = !q || text.includes(q);
    sec.style.display = match ? 'block' : 'none';
    const id = sec.getAttribute('id');
    const tocLink = document.querySelector(`.toc-link[href="#${id}"]`);
    if (tocLink) {
      tocLink.parentElement.style.display = match ? 'block' : 'none';
    }
  });
}

function renderDiagram(type, title) {
  if (type === 'decision') {
    return `
      <svg viewBox="0 0 400 120" class="svg-diagram">
        <polygon points="200,10 280,60 200,110 120,60" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
        <text x="200" y="65" text-anchor="middle" font-weight="bold" fill="var(--text)">${esc(title) || 'Decision?'}</text>
        <path d="M 280 60 L 350 60" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <text x="315" y="50" text-anchor="middle" font-size="12" fill="var(--text)">Yes</text>
        <path d="M 120 60 L 50 60" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <text x="85" y="50" text-anchor="middle" font-size="12" fill="var(--text)">No</text>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border)" />
          </marker>
        </defs>
      </svg>
    `;
  }
  if (type === 'branch') {
    return `
      <svg viewBox="0 0 400 180" class="svg-diagram">
        <rect x="150" y="10" width="100" height="40" rx="5" fill="var(--card)" stroke="var(--border)" stroke-width="2"/>
        <text x="200" y="35" text-anchor="middle" fill="var(--text)">Start</text>
        <path d="M 200 50 L 200 80 Q 200 90 110 90 L 80 90 L 80 110" fill="none" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <path d="M 200 50 L 200 80 Q 200 90 290 90 L 320 90 L 320 110" fill="none" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <rect x="30" y="110" width="100" height="40" rx="5" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
        <text x="80" y="135" text-anchor="middle" fill="var(--text)">Branch A</text>
        <rect x="270" y="110" width="100" height="40" rx="5" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
        <text x="320" y="135" text-anchor="middle" fill="var(--text)">Branch B</text>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border)" />
          </marker>
        </defs>
      </svg>
    `;
  }
  if (type === 'loop') {
    return `
      <svg viewBox="0 0 400 160" class="svg-diagram">
        <rect x="140" y="20" width="120" height="40" rx="5" fill="var(--card)" stroke="var(--accent)" stroke-width="2"/>
        <text x="200" y="45" text-anchor="middle" fill="var(--text)">${esc(title) || 'Work'}</text>
        <path d="M 200 60 L 200 100" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <polygon points="200,100 240,120 200,140 160,120" fill="var(--card)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="200" y="124" text-anchor="middle" font-size="10" fill="var(--text)">Done?</text>
        <path d="M 160 120 L 80 120 Q 70 120 70 80 Q 70 40 80 40 L 140 40" fill="none" stroke="var(--border)" stroke-width="2" marker-end="url(#arrow)"/>
        <text x="100" y="110" text-anchor="middle" font-size="10" fill="var(--text)">No</text>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--border)" />
          </marker>
        </defs>
      </svg>
    `;
  }
  return '';
}

function renderBody(data) {
  const h1 = document.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Plan Document';
  
  const tocList = document.getElementById('toc-list');
  const contentDiv = document.getElementById('content');
  if (!tocList || !contentDiv) return;
  
  let tocHtml = '';
  let contentHtml = '';
  
  (data.sections || []).forEach(sec => {
    const id = sec.id || sec.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    tocHtml += `<li><a href="#${id}" class="toc-link">${esc(sec.title)}</a></li>`;
    
    let innerHtml = '';
    if (sec.kind === 'prose') {
      innerHtml = `<div class="prose-block">${sec.body || ''}</div>`;
    } else if (sec.kind === 'steps') {
      innerHtml = `
        <ul class="steps-list">
          ${(sec.items || []).map(item => `
            <li class="step-item ${item.done ? 'done' : ''}">
              <span class="step-check">${item.done ? '✓' : '○'}</span>
              <span class="step-text">${esc(item.text)}</span>
            </li>
          `).join('')}
        </ul>
      `;
    } else if (sec.kind === 'compare') {
      innerHtml = `
        <div class="compare-grid">
          ${(sec.options || []).map(opt => `
            <div class="compare-card">
              <div class="compare-title">${esc(opt.name)}</div>
              <div class="compare-desc">${esc(opt.desc)}</div>
            </div>
          `).join('')}
        </div>
      `;
    } else if (sec.kind === 'callout') {
      const type = sec.type || 'info';
      innerHtml = `
        <div class="callout-box ${esc(type)}">
          <div class="callout-title">${esc(sec.title)}</div>
          <div class="callout-body">${esc(sec.body)}</div>
        </div>
      `;
    } else if (sec.kind === 'deepdive') {
      innerHtml = `
        <details class="deepdive-box">
          <summary>${esc(sec.summary || 'Details')}</summary>
          <div class="deepdive-body">${sec.body || ''}</div>
        </details>
      `;
    } else if (sec.kind === 'diagram') {
      innerHtml = `
        <div class="diagram-container">
          ${renderDiagram(sec.type, sec.title)}
        </div>
      `;
    }
    
    contentHtml += `
      <section id="${id}" class="spy-section">
        <h2>${esc(sec.title)}</h2>
        ${innerHtml}
      </section>
    `;
  });
  
  tocList.innerHTML = tocHtml;
  contentDiv.innerHTML = contentHtml;
  
  // Setup Scroll-Spy
  const observerOptions = { root: null, rootMargin: '0px 0px -60% 0px', threshold: 0 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute('id');
        document.querySelectorAll('.toc-link').forEach(link => {
          if (link.getAttribute('href') === '#' + id) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }
    });
  }, observerOptions);
  document.querySelectorAll('.spy-section').forEach(sec => observer.observe(sec));
}

// Reading Progress
window.addEventListener('scroll', () => {
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
  const bar = document.getElementById('reading-progress');
  if (bar) bar.style.width = scrolled + '%';
});

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Plan Document') + '\n\n';
  (data.sections || []).forEach(sec => {
    md += `## ${sec.title || 'Section'}\n\n`;
    if (sec.kind === 'prose') {
      md += `${sec.body || ''}\n\n`;
    } else if (sec.kind === 'steps') {
      (sec.items || []).forEach(item => {
        md += `- [${item.done ? 'x' : ' '}] ${item.text}\n`;
      });
      md += '\n';
    } else if (sec.kind === 'compare') {
      (sec.options || []).forEach(opt => {
        md += `- **${opt.name}**: ${opt.desc || ''}\n`;
      });
      md += '\n';
    } else if (sec.kind === 'callout') {
      md += `> **${sec.title || 'Important'}:** ${sec.body || ''}\n\n`;
    } else if (sec.kind === 'deepdive') {
      md += `<details><summary>${sec.summary || 'Details'}</summary>\n\n${sec.body || ''}\n\n</details>\n\n`;
    } else if (sec.kind === 'diagram') {
      md += `*Diagram: ${sec.type || 'Process'} - ${sec.title || ''}*\n\n`;
    }
  });
  return md.trim();
}
</script>
</body>
</html>
