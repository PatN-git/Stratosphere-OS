<!-- TEMPLATE: incident-timeline | slots: {{title}}, {{events[]:{time,title,severity:"p1"|"p2"|"p3"|"p4",body,milestone?:bool}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:800px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.timeline{position:relative;padding-left:2.5rem}
.timeline::before{content:"";position:absolute;left:.75rem;top:0;bottom:0;width:2px;background:var(--border)}
.event{position:relative;margin-bottom:1.25rem}
.event-dot{position:absolute;left:calc(-2.5rem + .75rem - .5rem);top:.35rem;width:1rem;height:1rem;border-radius:50%;border:2px solid;background:var(--bg)}
.p1{border-color:#ef4444;box-shadow:0 0 0 3px #fee2e2}.p2{border-color:#f97316}.p3{border-color:#f59e0b}.p4{border-color:#22c55e}
@media(prefers-color-scheme:dark){.p1{box-shadow:0 0 0 3px #450a0a}}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:.5rem;padding:.875rem 1rem}
.event-card.milestone{border-color:#2563eb;background:#eff6ff}
@media(prefers-color-scheme:dark){.event-card.milestone{background:#1e3a8a}}
.event-header{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.event-time{font-size:.8rem;font-family:monospace;opacity:.6;white-space:nowrap}
.event-title{font-weight:600;font-size:.95rem;flex:1}
.sev-badge{font-size:.65rem;font-weight:700;padding:.15rem .4rem;border-radius:.25rem;text-transform:uppercase}
.sev-p1{background:#fee2e2;color:#991b1b}.sev-p2{background:#ffedd5;color:#9a3412}.sev-p3{background:#fef3c7;color:#92400e}.sev-p4{background:#dcfce7;color:#166534}
@media(prefers-color-scheme:dark){.sev-p1{background:#7f1d1d;color:#fca5a5}.sev-p2{background:#7c2d12;color:#fdba74}.sev-p3{background:#713f12;color:#fde68a}.sev-p4{background:#14532d;color:#86efac}}
.event-body{font-size:.875rem;margin-top:.5rem;opacity:.8}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Incident Timeline · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="timeline" id="timeline"><!-- populated from planData() --></div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function esc(s){return(s===null||s===undefined)?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Incident Timeline';
  
  const timelineDiv = document.getElementById('timeline');
  if (timelineDiv) {
    let eventsHtml = '';
    (data.events || []).forEach(ev => {
      const sev = (ev.severity || 'p3').toLowerCase();
      eventsHtml += `
        <div class="event">
          <div class="event-dot ${esc(sev)}"></div>
          <div class="event-card ${ev.milestone ? 'milestone' : ''}">
            <div class="event-header">
              <span class="event-time">${esc(ev.time)}</span>
              <span class="event-title">${esc(ev.title)}</span>
              <span class="sev-badge sev-${esc(sev)}">${esc(sev)}</span>
            </div>
            ${ev.body ? `<div class="event-body">${esc(ev.body)}</div>` : ''}
          </div>
        </div>
      `;
    });
    timelineDiv.innerHTML = eventsHtml;
  }
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Incident Timeline') + '\n\n';
  (data.events || []).forEach(ev => {
    const milestoneStr = ev.milestone ? ' [Milestone]' : '';
    const sevStr = ev.severity ? ` [${ev.severity.toUpperCase()}]` : '';
    md += `**${ev.time || ''}** — ${ev.title || ''}${sevStr}${milestoneStr}\n`;
    if (ev.body) md += `${ev.body}\n`;
    md += '\n';
  });
  return md.trim();
}
</script>
</body>
</html>
