<!-- plan-html | md-equivalent: ~45 lines | html: ~150 lines | ratio: 3.3x | justified: wireframe comparison to evaluate layouts side by side using lenses -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search UI Comparison &amp; "5-Lens" Analysis</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--s1:#d1fae5;--s1t:#065f46;--s2:#fef9c3;--s2t:#854d0e;--s3:#fee2e2;--s3t:#991b1b;--wireframe-bg:#f1f5f9;--wireframe-border:#cbd5e1}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--s1:#064e3b;--s1t:#6ee7b7;--s2:#713f12;--s2t:#fde68a;--s3:#7f1d1d;--s3t:#fca5a5;--wireframe-bg:#1e293b;--wireframe-border:#475569}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;margin-bottom:2rem}
.column{border:1px solid var(--border);border-radius:.5rem;background:var(--bg);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;position:relative}
.column-title{font-size:1.1rem;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.column-desc{font-size:.85rem;opacity:.7;line-height:1.4}
.wireframe-box{border:1px solid var(--wireframe-border);border-radius:.375rem;background:var(--wireframe-bg);padding:.75rem;display:flex;flex-direction:column;gap:.5rem;min-height:240px}
.wf-region{border:1px dashed var(--wireframe-border);background:var(--bg);padding:.4rem;font-size:.75rem;border-radius:.25rem;font-family:monospace;text-align:center;font-weight:bold}
.rationale-header{font-size:.85rem;font-weight:700;margin-top:.5rem}
.rationale-text{font-size:.8rem;opacity:.8;line-height:1.4}
.lens-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.25rem;margin-top:.5rem}
.lens-badge{font-size:.7rem;font-weight:700;padding:.2rem;border-radius:.25rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.lens-val-5,.lens-val-4{color:var(--s1t);background:var(--s1)}
.lens-val-3{color:var(--s2t);background:var(--s2)}
.lens-val-2,.lens-val-1{color:var(--s3t);background:var(--s3)}
.lens-label{font-size:.6rem;opacity:.7;text-transform:uppercase}
.lens-score{font-size:.85rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Search UI Comparison &amp; "5-Lens" Analysis</h1>
      <div class="meta">Wireframe Comparison &amp; 5-Lens Evaluation · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="grid" id="compare-grid"><!-- populated from planData() --></div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{
  "title": "Search UI Comparison & \"5-Lens\" Analysis",
  "options": [
    {
      "name": "Option A: List View",
      "desc": "A linear layout displaying search results.",
      "rationale": "Simple to implement *quickly*.",
      "wireframe_regions": [
        {
          "name": "Header",
          "desc": "Logo & search input field <input>"
        },
        {
          "name": "Body",
          "desc": "List of items | with metadata"
        }
      ]
    },
    {
      "name": "Option B: Grid View",
      "desc": "Card-based grid view layout.",
      "rationale": "Better visually _pleasing_.",
      "wireframe_regions": [
        {
          "name": "Header",
          "desc": "Search bar & filters"
        },
        {
          "name": "Grid",
          "desc": "Cards with thumbnail images"
        }
      ]
    },
    {
      "name": "Option C: Map View [Advanced]",
      "desc": "Geospatial search representation.",
      "rationale": "Best for location #filtering.",
      "wireframe_regions": [
        {
          "name": "Sidebar",
          "desc": "Filtered lists"
        },
        {
          "name": "Map",
          "desc": "Interactive map pins"
        }
      ]
    }
  ],
  "lenses": [
    {
      "name": "UX Simplicity",
      "desc": "User friendliness & cognitive load"
    },
    {
      "name": "Performance",
      "desc": "Load speed & data footprint"
    },
    {
      "name": "Complexity",
      "desc": "Implementation overhead & risk"
    }
  ],
  "ratings": {
    "Option A: List View": {
      "UX Simplicity": {
        "score": 5,
        "note": "Easiest to scan."
      },
      "Performance": {
        "score": 5,
        "note": "Lightweight HTML payload."
      },
      "Complexity": {
        "score": 5,
        "note": "No extra libraries needed."
      }
    },
    "Option B: Grid View": {
      "UX Simplicity": {
        "score": 4,
        "note": "Requires good thumbnails."
      },
      "Performance": {
        "score": 3,
        "note": "Heavier due to images."
      },
      "Complexity": {
        "score": 4,
        "note": "Moderate CSS grid work."
      }
    },
    "Option C: Map View [Advanced]": {
      "UX Simplicity": {
        "score": 3,
        "note": "Powerful but complex."
      },
      "Performance": {
        "score": 2,
        "note": "Heavy JS bundle map runtime."
      },
      "Complexity": {
        "score": 1,
        "note": ""
      }
    }
  }
}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Wireframe Comparison';
  
  const gridDiv = document.getElementById('compare-grid');
  if (gridDiv) {
    let gridHtml = '';
    (data.options || []).forEach(opt => {
      gridHtml += `
        <div class="column">
          <div class="column-title">${opt.name}</div>
          <div class="column-desc">${opt.desc}</div>
          
          ${opt.wireframe_regions && opt.wireframe_regions.length > 0 ? `
            <div class="wireframe-box">
              ${opt.wireframe_regions.map(reg => `
                <div class="wf-region" title="${reg.desc || ''}">
                  [${reg.name}]
                </div>
              `).join('')}
            </div>
          ` : ''}
          
          ${opt.rationale ? `
            <div class="rationale-header">Rationale</div>
            <div class="rationale-text">${opt.rationale}</div>
          ` : ''}
          
          <div class="lens-grid">
            ${(data.lenses || []).map(lens => {
              const rating = (data.ratings && data.ratings[opt.name] && data.ratings[opt.name][lens.name]) || {};
              const score = rating.score || 0;
              const valClass = score ? `lens-val-${score}` : '';
              return `
                <div class="lens-badge ${valClass}" title="${rating.note || ''}">
                  <span class="lens-label">${lens.name}</span>
                  <span class="lens-score">${score ? `${score}/5` : '—'}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    });
    gridDiv.innerHTML = gridHtml;
  }
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Wireframe Comparison') + '\n\n';
  md += '## Options Considered\n';
  (data.options || []).forEach(opt => {
    md += `### ${opt.name}\n`;
    md += `${opt.desc}\n\n`;
    if (opt.rationale) md += `**Rationale:** ${opt.rationale}\n\n`;
    if (opt.wireframe_regions && opt.wireframe_regions.length > 0) {
      md += `**Wireframe Regions:**\n`;
      opt.wireframe_regions.forEach(reg => {
        md += `- **${reg.name}**: ${reg.desc || ''}\n`;
      });
      md += '\n';
    }
  });
  if (data.lenses && data.lenses.length > 0) {
    md += '## Evaluation Lenses\n';
    data.lenses.forEach(lens => {
      md += `- **${lens.name}**: ${lens.desc || ''}\n`;
    });
    md += '\n';
  }
  md += '## Ratings\n';
  (data.lenses || []).forEach(lens => {
    md += `### Lens: ${lens.name}\n`;
    (data.options || []).forEach(opt => {
      const rating = (data.ratings && data.ratings[opt.name] && data.ratings[opt.name][lens.name]) || {};
      const score = rating.score || '—';
      const note = rating.note || '';
      md += `- **${opt.name}**: Score: ${score}/5. ${note}\n`;
    });
    md += '\n';
  });
  return md.trim();
}
</script>
</body>
</html>
