<!-- TEMPLATE: status-report | slots: {{title}}, {{period}}, {{kpis[]:{label,value,unit,trend:"up"|"down"|"flat",good:"up"|"down"}}}, {{sections[]:{title,status:"ok"|"warn"|"crit",body}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1000px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.period{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:.625rem;padding:1.25rem}
.kpi-label{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;opacity:.6;margin-bottom:.5rem}
.kpi-value{font-size:2rem;font-weight:800;line-height:1}
.kpi-unit{font-size:.875rem;opacity:.5;margin-left:.25rem;font-weight:400}
.kpi-trend{font-size:.8rem;font-weight:600;margin-top:.4rem}
.trend-good{color:#16a34a}.trend-bad{color:#dc2626}.trend-flat{color:#94a3b8}
.section{border:1px solid var(--border);border-radius:.5rem;margin-bottom:.75rem;overflow:hidden}
.section-header{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;font-weight:600}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ok{background:#22c55e}.warn{background:#f59e0b}.crit{background:#ef4444}
.section-body{padding:1rem;border-top:1px solid var(--border);font-size:.925rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="period">{{period}} · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="kpi-grid" id="kpis"><!-- populated from planData() --></div>
  <div id="sections"><!-- populated from planData() --></div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Status Report';
  const periodDiv = container.querySelector('.period');
  if (periodDiv) periodDiv.textContent = `${data.period || ''} · Generated by plan-html`;
  
  const kpisDiv = document.getElementById('kpis');
  if (kpisDiv) {
    let kpiHtml = '';
    (data.kpis || []).forEach(kpi => {
      const isGood = kpi.trend === kpi.good;
      const isFlat = kpi.trend === 'flat';
      const trendClass = isFlat ? 'trend-flat' : (isGood ? 'trend-good' : 'trend-bad');
      const trendSymbol = kpi.trend === 'up' ? '▲' : (kpi.trend === 'down' ? '▼' : '▶');
      kpiHtml += `
        <div class="kpi-card">
          <div class="kpi-label">${kpi.label}</div>
          <div class="kpi-value">${kpi.value}<span class="kpi-unit">${kpi.unit || ''}</span></div>
          <div class="kpi-trend ${trendClass}">${trendSymbol} ${kpi.trend || ''}</div>
        </div>
      `;
    });
    kpisDiv.innerHTML = kpiHtml;
  }
  
  const sectionsDiv = document.getElementById('sections');
  if (sectionsDiv) {
    let sectionsHtml = '';
    (data.sections || []).forEach(sec => {
      const status = (sec.status || 'ok').toLowerCase();
      sectionsHtml += `
        <div class="section">
          <div class="section-header">
            <span class="status-dot ${status}"></span>
            <span>${sec.title}</span>
          </div>
          <div class="section-body">${sec.body || ''}</div>
        </div>
      `;
    });
    sectionsDiv.innerHTML = sectionsHtml;
  }
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Status Report') + '\n\n';
  if (data.period) md += `**Period:** ${data.period}\n\n`;
  md += '## Key Performance Indicators\n';
  (data.kpis || []).forEach(kpi => {
    const trendStr = kpi.trend ? ` (Trend: ${kpi.trend})` : '';
    md += `- **${kpi.label}**: ${kpi.value}${kpi.unit || ''}${trendStr}\n`;
  });
  md += '\n## Status Sections\n';
  (data.sections || []).forEach(sec => {
    md += `### ${sec.title} [Status: ${(sec.status || 'OK').toUpperCase()}]\n`;
    md += `${sec.body || ''}\n\n`;
  });
  return md.trim();
}
</script>
</body>
</html>
