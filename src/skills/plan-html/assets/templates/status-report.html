<!-- TEMPLATE: status-report | slots: {{title}}, {{period}}, {{kpis[]:{label,value,unit,trend:"up"|"down"|"flat",good:"up"|"down"}}}, {{sections[]:{title,status:"ok"|"warn"|"crit",body}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1000px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.period{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:.625rem;padding:1.25rem}
.kpi-label{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;opacity:.6;margin-bottom:.5rem}
.kpi-value{font-size:2rem;font-weight:800;line-height:1}
.kpi-unit{font-size:.875rem;opacity:.5;margin-left:.25rem;font-weight:400}
.kpi-trend{font-size:.8rem;font-weight:600;margin-top:.4rem}
.trend-good{color:#16a34a}.trend-bad{color:#dc2626}.trend-flat{color:#94a3b8}
.section{border:1px solid var(--border);border-radius:.5rem;margin-bottom:.75rem;overflow:hidden}
.section-header{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;font-weight:600}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ok{background:#22c55e}.warn{background:#f59e0b}.crit{background:#ef4444}
.section-body{padding:1rem;border-top:1px solid var(--border);font-size:.925rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="period">{{period}} · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="copyState()">Copy State</button>
      <button onclick="exportMd()">Export MD</button>
    </div>
  </header>
  <div class="kpi-grid" id="kpis"><!-- agent populates KPI cards --></div>
  <div id="sections"><!-- agent populates section cards --></div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function copyState(){navigator.clipboard.writeText(document.getElementById('plan-data').textContent.trim()).then(()=>toast('State copied!'))}
function exportMd(){
  let md='# '+document.querySelector('h1').textContent+'\n\n';
  document.querySelectorAll('.kpi-card').forEach(c=>{
    md+='**'+c.querySelector('.kpi-label').textContent.trim()+'**: '+c.querySelector('.kpi-value').textContent.trim()+'\n';
  });
  navigator.clipboard.writeText(md.trim()).then(()=>toast('Markdown copied!'))
}
</script>
</body>
</html>
