<!-- TEMPLATE: board | slots: {{title}}, {{columns[]:{id,label}}}, {{cards[]:{id,label,column,meta?}}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}}</title>
<style>
:root{
  --bg:#fff;
  --text:#171717;
  --border:#e5e5e5;
  --card:#f8fafc;
  --accent:#2563eb;
  --accent-muted:#dbeafe;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --shadow:0 1px 3px 0 rgba(0,0,0,0.1),0 1px 2px -1px rgba(0,0,0,0.1);
  --radius:0.5rem;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#090d16;
    --text:#f3f4f6;
    --border:#1f2937;
    --card:#111827;
    --accent:#3b82f6;
    --accent-muted:#1e3a8a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}

.board-layout { display: flex; gap: 1.5rem; overflow-x: auto; padding-bottom: 1.5rem; margin-top: 1rem; align-items: flex-start; }
.board-column { flex: 1; min-width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; min-height: 450px; transition: background 0.2s; }
.board-column.dragover { background: var(--accent-muted); border-color: var(--accent); }
.column-header { font-weight: 700; font-size: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.25rem; display: flex; justify-content: space-between; align-items: center; }
.column-count { font-size: 0.75rem; background: var(--border); padding: 0.15rem 0.5rem; border-radius: 9999px; opacity: 0.8; }
.cards-container { display: flex; flex-direction: column; gap: 0.75rem; min-height: 400px; }
.board-card { background: var(--bg); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.875rem; cursor: grab; user-select: none; box-shadow: var(--shadow); transition: transform 0.1s, box-shadow 0.1s; }
.board-card:active { cursor: grabbing; }
.board-card.dragging { opacity: 0.4; }
.card-label { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.25rem; }
.card-meta { font-size: 0.75rem; opacity: 0.6; }

.payload-box { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
.payload-box h3 { font-size: 1rem; margin-bottom: 0.5rem; }
textarea#change-payload { width: 100%; height: 100px; padding: 0.75rem; border-radius: 0.375rem; border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: monospace; font-size: 0.85rem; resize: none; }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: .6rem 1.25rem; border-radius: .375rem; transform: translateY(150%); transition: transform .3s cubic-bezier(.16,1,.3,1); z-index: 1000; font-size: .875rem }
.toast.show { transform: translateY(0) }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>{{title}}</h1>
      <div class="meta">Generic Board Editor · plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="copyChanges()">Copy Change Payload</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  
  <div class="board-layout">
    <!-- columns rendered here -->
  </div>
  
  <div class="payload-box">
    <h3>Emitted Change Payload</h3>
    <textarea id="change-payload" readonly placeholder="Move cards to generate payload..."></textarea>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{
  // Record original column states
  const data = planData();
  (data.cards || []).forEach(c => {
    if (!originalColumns[c.id]) {
      originalColumns[c.id] = c.column;
    }
  });
  renderBody(data);
});

const originalColumns = {};

function copyChanges() {
  const txt = document.getElementById('change-payload').value;
  navigator.clipboard.writeText(txt.trim()).then(() => showToast('Change payload copied!'));
}

function renderBody(data) {
  const container = document.querySelector('.board-layout');
  if (!container) return;
  
  const h1 = document.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Generic Board Editor';
  
  let html = '';
  const columns = data.columns || [];
  const cards = data.cards || [];
  
  columns.forEach(col => {
    const colCards = cards.filter(c => c.column === col.id);
    html += `
      <div class="board-column" id="col-${col.id}" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, '${col.id}')">
        <div class="column-header">
          <span>${col.label}</span>
          <span class="column-count">${colCards.length}</span>
        </div>
        <div class="cards-container">
          ${colCards.map(c => `
            <div class="board-card" id="card-${c.id}" draggable="true" ondragstart="dragStart(event, '${c.id}')" ondragend="dragEnd(event)">
              <div class="card-label">${c.label}</div>
              ${c.meta && c.meta.priority ? `<div class="card-meta">Priority: ${c.meta.priority}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
  
  // Re-sync script tag
  document.getElementById('plan-data').textContent = JSON.stringify(data, null, 2);
  
  // Compute change payload
  const changes = [];
  cards.forEach(c => {
    if (c.column !== originalColumns[c.id]) {
      changes.push(`${c.id} -> ${c.column}`);
    }
  });
  const textVal = document.getElementById('change-payload');
  if (textVal) textVal.value = changes.join('\n');
}

function dragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  document.getElementById('card-' + id).classList.add('dragging');
}

function dragEnd(e) {
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('dragging'));
}

function allowDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.add('dragover');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('dragover');
}

function drop(e, columnId) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const cardId = e.dataTransfer.getData('text/plain');
  
  const data = planData();
  const card = (data.cards || []).find(c => c.id === cardId);
  if (card && card.column !== columnId) {
    card.column = columnId;
    renderBody(data);
  }
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Generic Board') + '\n\n';
  (data.columns || []).forEach(col => {
    md += `## ${col.label}\n`;
    const colCards = (data.cards || []).filter(c => c.column === col.id);
    colCards.forEach(c => {
      const priorityStr = c.meta && c.meta.priority ? ` [Priority: ${c.meta.priority}]` : '';
      md += `- **${c.label}** (${c.id})${priorityStr}\n`;
    });
    md += '\n';
  });
  return md.trim();
}
</script>
</body>
</html>
