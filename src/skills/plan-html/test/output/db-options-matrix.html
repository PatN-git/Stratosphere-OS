<!-- plan-html | md-equivalent: ~35 lines | html: ~110 lines | ratio: 3.1x | justified: 3 options × 5 criteria side-by-side with color-coded ratings impossible in linear markdown -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Database Hosting Options — Trade-off Matrix</title>
<style>
:root{--bg:#fff;--text:#171717;--border:#e5e5e5;--card:#f8fafc;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--s1:#d1fae5;--s1t:#065f46;--s2:#fef9c3;--s2t:#854d0e;--s3:#fee2e2;--s3t:#991b1b}
@media(prefers-color-scheme:dark){:root{--bg:#090d16;--text:#f3f4f6;--border:#1f2937;--card:#111827;--s1:#064e3b;--s1t:#6ee7b7;--s2:#713f12;--s2t:#fde68a;--s3:#7f1d1d;--s3t:#fca5a5}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1.5rem;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
h1{font-size:1.75rem;font-weight:700}
.meta{font-size:.875rem;opacity:.6;margin-top:.25rem}
.toolbar{display:flex;gap:.5rem;flex-shrink:0}
button{font-family:var(--font);font-size:.8rem;font-weight:500;padding:.4rem .875rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--card)}
.table-wrap{overflow-x:auto;margin-top:.5rem}
table{width:100%;border-collapse:collapse;text-align:left}
th,td{padding:.75rem 1rem;border:1px solid var(--border);vertical-align:top}
thead th{background:var(--card);font-weight:700;font-size:.875rem;white-space:nowrap}
thead th:first-child{min-width:160px}
.option-header{font-weight:700;font-size:.9rem}
.option-sub{font-size:.8rem;opacity:.6;font-weight:400;margin-top:.2rem}
.cell-score{display:flex;flex-direction:column;gap:.35rem}
.dots{display:flex;gap:3px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.dot.filled{background:currentColor}
.score-5,.score-4{color:var(--s1t);background:var(--s1)}
.score-3{color:var(--s2t);background:var(--s2)}
.score-2,.score-1{color:var(--s3t);background:var(--s3)}
.score-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .4rem;border-radius:.25rem}
.note{font-size:.78rem;opacity:.75;margin-top:.2rem;line-height:1.3}
.winner{position:relative}
.winner::after{content:"★ Best";position:absolute;top:.4rem;right:.5rem;font-size:.65rem;font-weight:700;background:#2563eb;color:#fff;padding:.1rem .35rem;border-radius:.25rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:.375rem;transform:translateY(150%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;font-size:.875rem}
.toast.show{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Database Hosting Options</h1>
      <div class="meta">Trade-off Matrix · Generated by plan-html</div>
    </div>
    <div class="toolbar">
      <button onclick="exportMd()">Export Markdown</button>
      <button onclick="copyState()">Copy JSON State</button>
    </div>
  </header>
  <div class="table-wrap">
    <table id="matrix"><!-- populated from planData() --></table>
  </div>
</div>
<div class="toast" id="toast"></div>
<script id="plan-data" type="application/json">{
  "title": "Database Hosting Options",
  "options": [
    {"name": "Supabase", "desc": "Managed Postgres + Auth"},
    {"name": "PlanetScale", "desc": "Serverless MySQL"},
    {"name": "Self-hosted Postgres", "desc": "Fly.io / Render"}
  ],
  "criteria": [
    {"name": "Cost (free tier)", "desc": "Value of free offering"},
    {"name": "Operational burden", "desc": "Maintenance overhead"},
    {"name": "Auth integration", "desc": "Ease of securing queries"},
    {"name": "SQL compatibility", "desc": "Strictness of relational features"},
    {"name": "Scalability", "desc": "Ease of horizontal scaling"}
  ],
  "ratings": {
    "Supabase": {
      "Cost (free tier)": {"score": 4, "note": "500MB DB + Auth + Storage included"},
      "Operational burden": {"score": 5, "note": "Fully managed, auto-backups"},
      "Auth integration": {"score": 5, "note": "Built-in Auth + RLS = zero glue code"},
      "SQL compatibility": {"score": 5, "note": "Extensions, RLS, full SQL standard"},
      "Scalability": {"score": 3, "note": "Read replicas on Pro plan"}
    },
    "PlanetScale": {
      "Cost (free tier)": {"score": 4, "note": "1B row reads/mo free"},
      "Operational burden": {"score": 4, "note": "Serverless, no connection pooling needed"},
      "Auth integration": {"score": 2, "note": "Must add separate auth layer"},
      "SQL compatibility": {"score": 3, "note": "MySQL: No native JSON ops, no JSONB"},
      "Scalability": {"score": 5, "note": "Auto-sharding, horizontal scale"}
    },
    "Self-hosted Postgres": {
      "Cost (free tier)": {"score": 2, "note": "Instance cost $7+/mo min"},
      "Operational burden": {"score": 1, "note": "Manual backups, upgrades, pooling"},
      "Auth integration": {"score": 3, "note": "Full control, significant setup cost"},
      "SQL compatibility": {"score": 5, "note": "Full control over extensions"},
      "Scalability": {"score": 4, "note": "Scale vertically/horizontally, full control"}
    }
  }
}</script>
<script>
function planData(){return JSON.parse(document.getElementById('plan-data').textContent||'{}');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copyState(){navigator.clipboard.writeText(JSON.stringify(planData(),null,2)).then(()=>showToast('JSON state copied'));}
function exportMd(){navigator.clipboard.writeText(toMarkdown(planData())).then(()=>showToast('Markdown copied'));}
document.addEventListener('DOMContentLoaded',()=>{renderBody(planData());if(typeof afterRender==='function')afterRender(planData());});

function renderDots(score){
  return Array.from({length:5},(_,i)=>`<span class="dot ${i<score?'filled':''}"></span>`).join('');
}

function renderBody(data) {
  const container = document.querySelector('.wrap');
  if (!container) return;
  const h1 = container.querySelector('h1');
  if (h1) h1.textContent = data.title || 'Trade-off Matrix';
  
  const table = document.getElementById('matrix');
  if (!table) return;
  
  let bestOpt = null;
  let maxAvg = -1;
  const options = data.options || [];
  const criteria = data.criteria || [];
  
  if (options.length > 0 && criteria.length > 0) {
    options.forEach(opt => {
      let sum = 0;
      let count = 0;
      criteria.forEach(crit => {
        const rating = (data.ratings && data.ratings[opt.name] && data.ratings[opt.name][crit.name]) || {};
        if (rating.score !== undefined) {
          sum += rating.score;
          count++;
        }
      });
      const avg = count > 0 ? sum / count : 0;
      if (avg > maxAvg) {
        maxAvg = avg;
        bestOpt = opt.name;
      }
    });
  }

  let html = '<thead><tr><th>Criteria</th>';
  options.forEach(opt => {
    const isWinner = opt.name === bestOpt && maxAvg > 0;
    html += `<th class="${isWinner ? 'winner' : ''}">
      <div class="option-header">${opt.name}</div>
      <div class="option-sub">${opt.desc || ''}</div>
    </th>`;
  });
  html += '</tr></thead><tbody>';
  
  criteria.forEach(crit => {
    html += `<tr><td><strong>${crit.name}</strong><div class="option-sub">${crit.desc || ''}</div></td>`;
    options.forEach(opt => {
      const rating = (data.ratings && data.ratings[opt.name] && data.ratings[opt.name][crit.name]) || {};
      const score = rating.score || 0;
      const note = rating.note || '—';
      const scoreClass = score ? `score-${score}` : '';
      html += `<td>
        <div class="cell-score">
          <div class="dots">${renderDots(score)}</div>
          ${score ? `<span class="score-badge ${scoreClass}">Score ${score}/5</span>` : ''}
          <div class="note">${note}</div>
        </div>
      </td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function toMarkdown(data) {
  let md = '# ' + (data.title || 'Trade-off Matrix') + '\n\n';
  md += '## Options Considered\n';
  (data.options || []).forEach(opt => {
    md += `- **${opt.name}**: ${opt.desc || ''}\n`;
  });
  md += '\n## Evaluation Criteria\n';
  (data.criteria || []).forEach(crit => {
    md += `- **${crit.name}**: ${crit.desc || ''}\n`;
  });
  md += '\n## Ratings\n';
  (data.criteria || []).forEach(crit => {
    md += `### ${crit.name}\n`;
    (data.options || []).forEach(opt => {
      const rating = (data.ratings && data.ratings[opt.name] && data.ratings[opt.name][crit.name]) || {};
      const score = rating.score || '—';
      const note = rating.note || '';
      md += `- **${opt.name}**: Score: ${score}/5. ${note}\n`;
    });
    md += '\n';
  });
  return md.trim();
}
</script>
</body>
</html>
