name: build-guard

# dist/ is committed. This guard rebuilds the plugins from src/ and
# fails if the committed dist/ (or marketplace.json) is out of sync — i.e. if
# someone edited src/ without running `python build/build.py`.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Rebuild plugins from src/
        run: python build/build.py

      - name: Validate plugin structure
        run: python build/validate.py .

      - name: Validate subagent instructions
        run: python tests/test_subagent_spawning.py

      - name: Validate plan-html workflow delegation
        run: python tests/test_plan_html_delegation.py

      - name: Validate utility scripts
        run: python tests/verify_scripts.py

      - name: Verify plan-html behavioral correctness
        run: node tests/verify_plan_html.mjs

      - name: Fail if dist/ drifted from src/
        run: |
          DRIFT="$(git status --porcelain dist/ .claude-plugin/marketplace.json)"
          if [ -n "$DRIFT" ]; then
            echo "::error::dist/ or marketplace.json out of sync. Run 'python build/build.py' and commit."
            echo "$DRIFT"
            exit 1
          fi
          echo "dist/ and marketplace.json are in sync with src/."

  install-harness-l1:
    # Deterministic install/scaffold/sync E2E (no agent). L2 + real marketplace
    # need auth/network, so run those via workflow_dispatch or locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build dist/ (installers require it)
        run: python build/build.py

      - name: L1 install/scaffold/sync E2E
        run: bash tests/install-harness/run-L1.sh
