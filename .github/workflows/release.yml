name: Release Automation

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Release on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version from build/build.py
        id: get_version
        run: |
          VERSION=$(python - << 'EOF'
          import re
          content = open('build/build.py').read()
          m = re.search(r'VERSION\s*=\s*["\']([^"\']+)["\']', content)
          print(m.group(1) if m else '')
          EOF
          )
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract VERSION from build/build.py"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists (Idempotency gate)
        id: check_tag
        run: |
          if [ -n "$(git ls-remote --tags origin "refs/tags/v$VERSION")" ]; then
            echo "Release v$VERSION already exists — nothing to do."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release v$VERSION does not exist. Proceeding."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build plugins
        if: steps.check_tag.outputs.exists != 'true'
        run: python build/build.py

      - name: Validate distribution
        if: steps.check_tag.outputs.exists != 'true'
        run: python build/validate.py

      - name: Check for stale or untracked distribution files
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "ERROR: dist/ is out of sync with src/ (modified or untracked files found)"
            git status --porcelain dist/
            git diff dist/
            exit 1
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
